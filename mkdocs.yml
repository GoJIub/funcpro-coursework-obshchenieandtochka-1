site_name: LispNT
site_description: Небольшой функциональный язык на F#
docs_dir: docs

nav:
  - Главная: index.md
  - Синтаксис: syntax.md
  - Спецификация: language-spec.md
  - Стандартная библиотека: standard-library.md
  - Примеры: examples.md
  - Архитектура: architecture.md
  - Трассировщик: trace.md
  - Использование ИИ:
      - Политика: ai-usage/00-policy.md
      - Лог участника 1: ai-usage/01-log-participant-1.md
      - Лог участника 2: ai-usage/01-log-participant-2.md
      - Лог участника 3: ai-usage/01-log-participant-3.md
      - Командные решения: ai-usage/02-team-decisions.md

theme:
  name: material
  language: ru
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
